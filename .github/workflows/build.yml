name: Build

on:
  push:
    branches: [main, feature/*, fix/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-native:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --parallel

      - name: Upload build artifact
        if: matrix.build_type == 'Debug'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hevc-decode-debug
          path: build/hevc-decode

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 3.1.51

      - name: Configure
        run: emcmake cmake -B build-wasm -DBUILD_WASM=ON -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build-wasm --parallel
