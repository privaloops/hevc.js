name: Build

on:
  push:
    branches: [main, feature/*, fix/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-native:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --parallel

      - name: Upload build artifact
        if: matrix.build_type == 'Debug'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hevc-decode-debug
          path: build/hevc-decode

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: 3.1.51

      - name: Configure
        run: emcmake cmake -B build-wasm -DBUILD_WASM=ON -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build-wasm --parallel
