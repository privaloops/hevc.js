name: Test

on:
  push:
    branches: [main, feature/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure --label-exclude oracle

      - name: Verify test count
        working-directory: build
        run: |
          TOTAL=$(ctest --label-exclude oracle -N | tail -1 | grep -oP '\d+(?= tests)')
          echo "Unit tests found: $TOTAL"
          if [ "$TOTAL" -lt 80 ]; then
            echo "::error::Expected at least 80 unit tests, found $TOTAL — tests may be silently missing"
            exit 1
          fi

  oracle-tests:
    name: Oracle Tests (pixel-perfect)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run oracle tests
        working-directory: build
        run: ctest --output-on-failure --label-regex oracle

      - name: Verify total test count (unit + oracle)
        working-directory: build
        run: |
          TOTAL=$(ctest -N | tail -1 | grep -oP '\d+(?= tests)')
          echo "Total tests found: $TOTAL"
          if [ "$TOTAL" -lt 128 ]; then
            echo "::error::Expected at least 128 total tests, found $TOTAL — tests may be silently missing"
            exit 1
          fi

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Benchmark — 1080p (50 frames, BBB)
        id: bench_1080p
        run: |
          OUTPUT=$(./build/hevc-decode tests/conformance/fixtures/bbb1080_50f.265 -o /dev/null 2>&1)
          echo "$OUTPUT"
          FPS=$(echo "$OUTPUT" | grep -oP '[\d.]+ fps' | head -1)
          MS=$(echo "$OUTPUT" | grep -oP '[\d.]+ ms/frame' | head -1)
          echo "fps=$FPS" >> "$GITHUB_OUTPUT"
          echo "ms=$MS" >> "$GITHUB_OUTPUT"

      - name: Benchmark — 4K (25 frames, BBB)
        id: bench_4k
        run: |
          OUTPUT=$(./build/hevc-decode tests/conformance/fixtures/bbb4k_25f.265 -o /dev/null 2>&1)
          echo "$OUTPUT"
          FPS=$(echo "$OUTPUT" | grep -oP '[\d.]+ fps' | head -1)
          MS=$(echo "$OUTPUT" | grep -oP '[\d.]+ ms/frame' | head -1)
          echo "fps=$FPS" >> "$GITHUB_OUTPUT"
          echo "ms=$MS" >> "$GITHUB_OUTPUT"

      - name: Post benchmark results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Benchmark Results (GitHub Actions runner)

            | Resolution | FPS | ms/frame |
            |-----------|-----|----------|
            | 1080p (50f) | ${{ steps.bench_1080p.outputs.fps }} | ${{ steps.bench_1080p.outputs.ms }} |
            | 4K (25f) | ${{ steps.bench_4k.outputs.fps }} | ${{ steps.bench_4k.outputs.ms }} |

            > **Note**: GitHub Actions runners (2-core x86) are ~2-3x slower than Apple Silicon.
            > These numbers are for regression detection, not absolute performance.

            <sub>🤖 Auto-generated by CI benchmark</sub>`;

            // Find existing benchmark comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Benchmark Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
