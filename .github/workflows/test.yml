name: Test

on:
  push:
    branches: [main, feature/*, fix/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure --label-exclude oracle

      - name: Verify test count
        working-directory: build
        run: |
          TOTAL=$(ctest --label-exclude oracle -N 2>&1 | grep -oE 'Total Tests: [0-9]+' | grep -oE '[0-9]+')
          echo "Unit tests found: $TOTAL"
          if [ -z "$TOTAL" ] || [ "$TOTAL" -lt 70 ]; then
            echo "::error::Expected at least 70 unit tests, found ${TOTAL:-0}"
            exit 1
          fi

  oracle-tests:
    name: Oracle Tests (pixel-perfect)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run oracle tests
        working-directory: build
        run: ctest --output-on-failure --label-regex oracle

      - name: Verify total test count (unit + oracle)
        working-directory: build
        run: |
          TOTAL=$(ctest -N 2>&1 | grep -oE 'Total Tests: [0-9]+' | grep -oE '[0-9]+')
          echo "Total tests found: $TOTAL"
          # 103 = base tests (unit + oracle). 128 requires edge-case fixtures
          # generated locally by tools/fetch_conformance.sh (x265 + ffmpeg).
          if [ -z "$TOTAL" ] || [ "$TOTAL" -lt 100 ]; then
            echo "::error::Expected at least 100 total tests, found ${TOTAL:-0}"
            exit 1
          fi

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Benchmark — 1080p (50 frames, BBB)
        id: bench_1080p
        run: |
          OUTPUT=$(./build/hevc-decode tests/conformance/fixtures/bbb1080_50f.265 -o /dev/null 2>&1)
          echo "$OUTPUT"
          FPS=$(echo "$OUTPUT" | grep -oE '[0-9.]+ fps' | head -1)
          MS=$(echo "$OUTPUT" | grep -oE '[0-9.]+ ms/frame' | head -1)
          echo "fps=$FPS" >> "$GITHUB_OUTPUT"
          echo "ms=$MS" >> "$GITHUB_OUTPUT"

      - name: Benchmark — 4K (25 frames, BBB)
        id: bench_4k
        run: |
          OUTPUT=$(./build/hevc-decode tests/conformance/fixtures/bbb4k_25f.265 -o /dev/null 2>&1)
          echo "$OUTPUT"
          FPS=$(echo "$OUTPUT" | grep -oE '[0-9.]+ fps' | head -1)
          MS=$(echo "$OUTPUT" | grep -oE '[0-9.]+ ms/frame' | head -1)
          echo "fps=$FPS" >> "$GITHUB_OUTPUT"
          echo "ms=$MS" >> "$GITHUB_OUTPUT"

      - name: Post benchmark results to PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          FPS_1080P: ${{ steps.bench_1080p.outputs.fps }}
          MS_1080P: ${{ steps.bench_1080p.outputs.ms }}
          FPS_4K: ${{ steps.bench_4k.outputs.fps }}
          MS_4K: ${{ steps.bench_4k.outputs.ms }}
        with:
          script: |
            const body = [
              '## Benchmark Results (GitHub Actions runner)',
              '',
              '| Resolution | FPS | ms/frame |',
              '|-----------|-----|----------|',
              `| 1080p (50f) | ${process.env.FPS_1080P} | ${process.env.MS_1080P} |`,
              `| 4K (25f) | ${process.env.FPS_4K} | ${process.env.MS_4K} |`,
              '',
              '> **Note**: GitHub Actions runners (2-core x86) are ~2-3x slower than Apple Silicon.',
              '> These numbers are for regression detection, not absolute performance.',
              '',
              '<sub>Auto-generated by CI benchmark</sub>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Benchmark Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
