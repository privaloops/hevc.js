<h1>hevc.js — Video.js + mux.js MSE</h1>
<p class="sub">HEVC fMP4 → WASM decode → VideoEncoder H.264 → mux.js fMP4 → MSE → Video.js</p>

<div class="player-wrap">
  <video-js id="player" class="vjs-big-play-centered vjs-fluid" controls muted></video-js>
  <div style="display:flex;gap:8px;margin:8px 0">
    <button onclick="loadRes('bbb720')">BBB 720p</button>
    <button onclick="loadRes('bbb1080')">BBB 1080p</button>
    <button onclick="loadRes('bbb4k')">BBB 4K</button>
    <button onclick="loadUrl()">Load URL</button>
    <input id="hls-url" type="text" value="https://manifest-arte.akamaized.net/api/manifest/v1/Generate/e9cc382e-dc08-468a-91e6-ffddc9e27a10/fr/XQ+KS+CHEV1/125540-000-A.m3u8"
      style="background:#16213e;border:1px solid #0f3460;color:#e0e0e0;padding:6px;border-radius:4px;font-size:0.8em;flex:1;min-width:200px">
  </div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mux.js@7.0.3/dist/mux.min.js"></script>
<script src="hevc-decode.js"></script>
<script>
const logEl = document.getElementById('log');
const log = msg => { logEl.textContent += `[${(performance.now()/1000).toFixed(3)}] ${msg}\n`; logEl.scrollTop = logEl.scrollHeight; };

// ============================================================
// HEVC SourceHandler — decodes HEVC, re-encodes H.264, feeds MSE
// ============================================================

class HEVCHandler {
  constructor(source, tech) {
    this.tech = tech;
    this.videoEl = tech.el();
    this.disposed = false;
    this.api = null;       // WASM decoder
    this.ms = null;        // MediaSource
    this.sb = null;        // SourceBuffer
    this.encoder = null;   // VideoEncoder
    this.muxTrack = null;  // mux.js track object
    this.seqNum = 1;
    this.baseDecodeTime = 0;
    this.fps = 25;
    this.timescale = 90000;
    this.mseReady = false;
    this.appendQueue = [];
    this.appending = false;

    this._run(source.src);
  }

  async _run(url) {
    try {
      // 1. Init WASM
      log('Loading WASM decoder...');
      const m = await HEVCDecoderModule();
      if (this.disposed) return;
      this.api = { m,
        dec: m.cwrap('hevc_decoder_create','number',[])(),
        feed: m.cwrap('hevc_decoder_feed','number',['number','number','number']),
        drain: m.cwrap('hevc_decoder_drain','number',['number','number']),
        getFrame: m.cwrap('hevc_decoder_get_drained_frame','number',['number','number','number']),
        flush: m.cwrap('hevc_decoder_flush','number',['number']),
      };
      log('WASM ready');
      this._startTime = performance.now();

      // 2. Setup MSE
      this.ms = new MediaSource();
      this.videoEl.src = URL.createObjectURL(this.ms);
      await new Promise(r => this.ms.addEventListener('sourceopen', r, { once: true }));
      log('MediaSource open');

      // 3. Parse HLS (handle master playlist → find HEVC variant)
      let playlistUrl = new URL(url, location.href).href;
      const masterText = await (await fetch(playlistUrl)).text();

      if (masterText.includes('#EXT-X-STREAM-INF')) {
        const lines = masterText.split('\n').map(l => l.trim());
        let hevcUrl = null;
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].includes('hev1') || lines[i].includes('hvc1')) {
            for (let j = i + 1; j < lines.length; j++) {
              if (lines[j] && !lines[j].startsWith('#')) { hevcUrl = lines[j]; break; }
            }
            if (hevcUrl) {
              const res = lines[i].match(/RESOLUTION=([^,]+)/)?.[1] || '?';
              log(`Found HEVC variant: ${res}`);
              break;
            }
          }
        }
        if (!hevcUrl) { log('ERROR: no HEVC variant in master playlist'); return; }
        playlistUrl = new URL(hevcUrl, playlistUrl).href;
        log(`Variant playlist: ${playlistUrl}`);
      }

      const text = await (await fetch(playlistUrl)).text();
      const { initUri, initByteRange, segs } = this._parseM3U8(text, playlistUrl);
      log(`HLS: ${segs.length} segment(s), byterange=${segs[0]?.byteRange ? 'yes' : 'no'}`);

      // 4. Feed config NALs from init segment
      if (initUri) {
        const initData = await this._fetchRange(initUri, initByteRange);
        const cfgNals = this._configNalsFromHvcC(this._findHvcC(initData));
        if (cfgNals.length > 0) {
          this._feedWasm(this._nalsToAnnexB(cfgNals));
          log(`${cfgNals.length} config NALs fed (VPS/SPS/PPS)`);
        }
      }

      // 5. Process segments progressively: play starts after first segment
      let totalFrames = 0;
      for (let si = 0; si < segs.length; si++) {
        if (this.disposed) return;
        await this._processSegment(si, segs[si]);

        // Start playback after first segment is ready
        if (si === 0) {
          await this._waitAppends();
          this.videoEl.play().catch(() => {});
          log('▶ Playback started (first segment ready)');
        }

        totalFrames += (this._lastSegFrames || 0);
      }

      // 6. Flush remaining B-frames
      const flushed = this._flushWasm();
      if (flushed.length > 0) {
        await this._encodeAndMux(flushed);
        totalFrames += flushed.length;
        log(`Flush: ${flushed.length} frames`);
      }

      if (this.encoder) await this.encoder.flush();
      await this._waitAppends();
      this.ms.endOfStream();

      const totalMs = performance.now() - this._startTime;
      const w = this._videoWidth || '?', h = this._videoHeight || '?';
      log(`Done! ${totalFrames} frames ${w}x${h} in ${(totalMs/1000).toFixed(2)}s`);
      document.getElementById('info').textContent =
        `${w}x${h} | ${totalFrames} frames | HEVC→H.264→MSE`;

    } catch (e) {
      log('ERROR: ' + e.message);
      console.error(e);
    }
  }

  async _fetchRange(url, byteRange) {
    const opts = {};
    if (byteRange) {
      const start = byteRange.offset;
      const end = start + byteRange.length - 1;
      opts.headers = { Range: `bytes=${start}-${end}` };
    }
    const resp = await fetch(url, opts);
    return new Uint8Array(await resp.arrayBuffer());
  }

  async _processSegment(si, seg) {
    const segT0 = performance.now();
    const segData = await this._fetchRange(seg.uri, seg.byteRange);
    const fetchMs = performance.now() - segT0;
    const samples = this._samplesFromSegment(segData);

    // Decode
    const decT0 = performance.now();
    for (const s of samples) this._feedWasm(this._sampleToAnnexB(s));
    const frames = this._drainWasm();
    const decMs = performance.now() - decT0;

    if (frames.length === 0) { log(`Seg ${si}: 0 frames`); return; }

    if (!this._videoWidth) {
      this._videoWidth = frames[0].width;
      this._videoHeight = frames[0].height;
    }

    // Encode + mux
    const encT0 = performance.now();
    await this._encodeAndMux(frames);
    const encMs = performance.now() - encT0;

    const totalMs = performance.now() - segT0;
    const segDuration = frames.length / this.fps;
    const ratio = (segDuration * 1000 / totalMs).toFixed(1);
    const status = totalMs < segDuration * 1000 ? '✓ realtime' : '⚠ too slow';
    this._lastSegFrames = frames.length;
    log(`Seg ${si}: ${frames.length}f ${this._videoWidth}x${this._videoHeight} | fetch ${fetchMs.toFixed(0)}ms decode ${decMs.toFixed(0)}ms encode ${encMs.toFixed(0)}ms | ${totalMs.toFixed(0)}ms total vs ${(segDuration*1000).toFixed(0)}ms content → ${ratio}x ${status}`);
  }

  async _encodeAndMux(frames) {
    const w = frames[0].width, h = frames[0].height;

    // Init encoder on first call
    if (!this.encoder) {
      this.encoder = new VideoEncoder({
        output: (chunk, meta) => this._onEncodedChunk(chunk, meta),
        error: (e) => log('Encoder error: ' + e.message),
      });
      // Level auto: 3.1 for ≤720p, 4.0 for ≤1080p, 5.1 for 4K
      const level = (w > 1920 || h > 1080) ? '33' : (w > 1280 || h > 720) ? '28' : '1f';
      this._codec = `avc1.4200${level}`;
      this.encoder.configure({
        codec: this._codec,
        width: w, height: h,
        bitrate: w * h * this.fps * 0.15,
        framerate: this.fps,
        hardwareAcceleration: 'prefer-hardware',
        avc: { format: 'avc' },
      });
      log(`H.264 encoder: ${w}x${h} ${this._codec}`);
    }

    // Collect chunks for this batch
    this._pendingChunks = [];
    this._chunkResolve = null;
    const chunkPromise = new Promise(r => { this._chunkResolve = r; });
    this._expectedChunks = frames.length;

    for (let i = 0; i < frames.length; i++) {
      const f = frames[i];
      const i420 = this._toI420(f);
      const vf = new VideoFrame(i420, {
        format: 'I420', codedWidth: f.width, codedHeight: f.height,
        timestamp: Math.round((this.baseDecodeTime / this.timescale + i / this.fps) * 1e6),
        duration: Math.round(1e6 / this.fps),
      });
      this.encoder.encode(vf, { keyFrame: i === 0 });
      vf.close();
    }

    await this.encoder.flush();

    // Mux collected chunks
    const chunks = this._pendingChunks;
    if (chunks.length === 0) return;

    // Parse avcC for mux.js track (first time)
    if (!this.muxTrack && this._avcCDesc) {
      const info = this._parseAvcC(this._avcCDesc);
      this.muxTrack = {
        type: 'video', id: 1, width: frames[0].width, height: frames[0].height,
        timescale: this.timescale, duration: 0,
        sps: info.sps, pps: info.pps,
        profileIdc: info.profileIdc, profileCompatibility: info.profileCompat,
        levelIdc: info.levelIdc,
        baseMediaDecodeTime: 0, samples: [],
      };

      // Generate + append init segment
      const initSeg = muxjs.mp4.generator.initSegment([this.muxTrack]);
      const mime = `video/mp4; codecs="${this._codec}"`;
      this.sb = this.ms.addSourceBuffer(mime);
      this.sb.addEventListener('updateend', () => this._onUpdateEnd());
      await this._appendBuffer(initSeg);
      this.mseReady = true;
      log('MSE init segment appended');
    }

    if (!this.muxTrack) return;

    // Build mux.js samples + mdat data
    const mdatParts = [];
    this.muxTrack.samples = [];
    this.muxTrack.baseMediaDecodeTime = this.baseDecodeTime;

    for (const c of chunks) {
      const dur = Math.round((c.duration || 1e6 / this.fps) * this.timescale / 1e6);
      this.muxTrack.samples.push({
        duration: dur,
        size: c.data.byteLength,
        flags: {
          isLeading: 0,
          dependsOn: c.isKey ? 2 : 1,
          isDependedOn: c.isKey ? 1 : 0,
          hasRedundancy: 0,
          degradationPriority: 0,
          isNonSyncSample: c.isKey ? 0 : 1,
        },
        compositionTimeOffset: 0,
      });
      mdatParts.push(c.data);
      this.baseDecodeTime += dur;
    }

    const moofBox = muxjs.mp4.generator.moof(this.seqNum++, [this.muxTrack]);
    const totalData = mdatParts.reduce((s, d) => s + d.byteLength, 0);
    const mdatData = new Uint8Array(totalData);
    let off = 0;
    for (const d of mdatParts) { mdatData.set(d, off); off += d.byteLength; }
    const mdatBox = muxjs.mp4.generator.mdat(mdatData);

    const segment = new Uint8Array(moofBox.byteLength + mdatBox.byteLength);
    segment.set(moofBox, 0);
    segment.set(mdatBox, moofBox.byteLength);

    await this._appendBuffer(segment);
  }

  _onEncodedChunk(chunk, meta) {
    if (meta?.decoderConfig?.description && !this._avcCDesc) {
      const d = meta.decoderConfig.description;
      this._avcCDesc = new Uint8Array(d instanceof ArrayBuffer ? d : d.buffer || d);
    }
    const data = new Uint8Array(chunk.byteLength);
    chunk.copyTo(data);
    this._pendingChunks.push({ data, isKey: chunk.type === 'key', duration: chunk.duration, timestamp: chunk.timestamp });
  }

  // ---- MSE append queue ----

  _appendBuffer(data) {
    return new Promise((resolve, reject) => {
      this.appendQueue.push({ data, resolve, reject });
      this._flushAppendQueue();
    });
  }

  _flushAppendQueue() {
    if (this.appending || this.appendQueue.length === 0 || !this.sb) return;
    this.appending = true;
    const { data } = this.appendQueue[0];
    try {
      this.sb.appendBuffer(data);
    } catch (e) {
      this.appendQueue.shift().reject(e);
      this.appending = false;
    }
  }

  _onUpdateEnd() {
    this.appending = false;
    if (this.appendQueue.length > 0) {
      this.appendQueue.shift().resolve();
    }
    this._flushAppendQueue();
  }

  _waitAppends() {
    return new Promise(resolve => {
      const check = () => {
        if (this.appendQueue.length === 0 && !this.appending) resolve();
        else setTimeout(check, 20);
      };
      check();
    });
  }

  // ---- YUV → I420 ----

  _toI420(f) {
    const ySize = f.width * f.height, cSize = f.chromaWidth * f.chromaHeight;
    const buf = new Uint8Array(ySize + cSize * 2);
    const y = f.y, cb = f.cb, cr = f.cr;
    if (f.bitDepth <= 8) {
      for (let i = 0; i < ySize; i++) buf[i] = y[i];
      for (let i = 0; i < cSize; i++) buf[ySize + i] = cb[i];
      for (let i = 0; i < cSize; i++) buf[ySize + cSize + i] = cr[i];
    } else {
      const shift = f.bitDepth - 8;
      for (let i = 0; i < ySize; i++) buf[i] = y[i] >> shift;
      for (let i = 0; i < cSize; i++) buf[ySize + i] = cb[i] >> shift;
      for (let i = 0; i < cSize; i++) buf[ySize + cSize + i] = cr[i] >> shift;
    }
    return buf;
  }

  // ---- Parse avcC → SPS/PPS ----

  _parseAvcC(desc) {
    const v = new DataView(desc.buffer, desc.byteOffset, desc.byteLength);
    const profileIdc = desc[1], profileCompat = desc[2], levelIdc = desc[3];
    let off = 6;
    const sps = [], numSps = desc[5] & 0x1F;
    for (let i = 0; i < numSps; i++) {
      const len = v.getUint16(off); off += 2;
      sps.push(new Uint8Array(desc.buffer, desc.byteOffset + off, len)); off += len;
    }
    const pps = [], numPps = desc[off++];
    for (let i = 0; i < numPps; i++) {
      const len = v.getUint16(off); off += 2;
      pps.push(new Uint8Array(desc.buffer, desc.byteOffset + off, len)); off += len;
    }
    return { profileIdc, profileCompat, levelIdc, sps, pps };
  }

  // ---- WASM decoder ----

  _feedWasm(data) {
    const p = this.api.m._malloc(data.length);
    this.api.m.HEAPU8.set(data, p);
    this.api.feed(this.api.dec, p, data.length);
    this.api.m._free(p);
  }

  _drainWasm() {
    const m = this.api.m, cp = m._malloc(4);
    this.api.drain(this.api.dec, cp);
    const n = m.getValue(cp, 'i32'); m._free(cp);
    const frames = [], fp = m._malloc(48);
    for (let i = 0; i < n; i++) {
      if (this.api.getFrame(this.api.dec, i, fp) !== 0) continue;
      frames.push(this._extractFrame(fp));
    }
    m._free(fp);
    return frames;
  }

  _flushWasm() {
    this.api.flush(this.api.dec);
    const frames = [], fp = this.api.m._malloc(48);
    for (let i = 0; ; i++) {
      if (this.api.getFrame(this.api.dec, i, fp) !== 0) break;
      frames.push(this._extractFrame(fp));
    }
    this.api.m._free(fp);
    return frames;
  }

  _extractFrame(fp) {
    const m = this.api.m;
    const w=m.getValue(fp+12,'i32'),h=m.getValue(fp+16,'i32');
    const sY=m.getValue(fp+20,'i32'),sC=m.getValue(fp+24,'i32');
    const cw=m.getValue(fp+28,'i32'),ch=m.getValue(fp+32,'i32');
    const bd=m.getValue(fp+36,'i32');
    const cp=(ptr,pw,ph,ps)=>{const o=new Uint16Array(pw*ph),b=ptr>>1;
      for(let y=0;y<ph;y++)o.set(m.HEAPU16.subarray(b+y*ps,b+y*ps+pw),y*pw);return o};
    return {y:cp(m.getValue(fp,'*'),w,h,sY),cb:cp(m.getValue(fp+4,'*'),cw,ch,sC),
      cr:cp(m.getValue(fp+8,'*'),cw,ch,sC),width:w,height:h,chromaWidth:cw,chromaHeight:ch,bitDepth:bd};
  }

  // ---- HLS/fMP4 ----

  _parseM3U8(text, base) {
    const lines = text.split('\n').map(l => l.trim());
    let initUri = null, initByteRange = null;
    let dur = 0, byteRange = null;
    const segs = [];

    for (const l of lines) {
      if (l.startsWith('#EXT-X-MAP:')) {
        const mu = l.match(/URI="([^"]+)"/);
        if (mu) initUri = new URL(mu[1], base).href;
        const mb = l.match(/BYTERANGE="(\d+)@(\d+)"/);
        if (mb) initByteRange = { length: parseInt(mb[1]), offset: parseInt(mb[2]) };
      } else if (l.startsWith('#EXTINF:')) {
        dur = parseFloat(l.split(':')[1]);
      } else if (l.startsWith('#EXT-X-BYTERANGE:')) {
        const parts = l.slice(17).split('@');
        byteRange = { length: parseInt(parts[0]), offset: parts[1] ? parseInt(parts[1]) : null };
      } else if (l && !l.startsWith('#')) {
        const seg = { uri: new URL(l, base).href, dur };
        if (byteRange) { seg.byteRange = byteRange; byteRange = null; }
        segs.push(seg);
      }
    }
    return { initUri, initByteRange, segs };
  }

  _findHvcC(d) {
    const w=(d,s,e)=>{let o=s;while(o+8<=e){const v=new DataView(d.buffer,d.byteOffset,d.byteLength);
      let sz=v.getUint32(o),tp=v.getUint32(o+4);if(sz===0)sz=e-o;if(sz<8)break;
      if(tp===0x68766343)return d.subarray(o+8,o+sz);
      if([0x6D6F6F76,0x7472616B,0x6D646961,0x6D696E66,0x7374626C].includes(tp)){const r=w(d,o+8,o+sz);if(r)return r;}
      if(tp===0x73747364){const r=w(d,o+16,o+sz);if(r)return r;}
      if(tp===0x68766331||tp===0x68657631){const r=w(d,o+86,o+sz);if(r)return r;}
      o+=sz;}return null;};
    return w(d,0,d.length);
  }

  _configNalsFromHvcC(h) {
    if(!h||h.length<23)return[];const v=new DataView(h.buffer,h.byteOffset,h.byteLength);
    const nals=[];let o=23;for(let a=0;a<h[22];a++){if(o+3>h.length)break;const c=v.getUint16(o+1);o+=3;
      for(let i=0;i<c;i++){if(o+2>h.length)break;const l=v.getUint16(o);o+=2;if(o+l>h.length)break;nals.push(h.subarray(o,o+l));o+=l;}}
    return nals;
  }

  _samplesFromSegment(d) {
    const v=new DataView(d.buffer,d.byteOffset,d.byteLength);const samps=[];
    let mo=-1,ms=0,o=0;
    while(o+8<=d.length){let sz=v.getUint32(o),tp=v.getUint32(o+4);if(sz===0)sz=d.length-o;if(sz<8)break;
      if(tp===0x6D6F6F66){mo=o;ms=sz;}
      else if(tp===0x6D646174&&mo>=0){const ss=this._trunSz(v,mo,ms);let p=o+8;
        for(const s of ss){if(p+s<=o+sz)samps.push(d.subarray(p,p+s));p+=s;}mo=-1;}
      o+=sz;}return samps;
  }

  _trunSz(v,mo,ms){const sz=[];let o=mo+8;while(o+8<=mo+ms){const s=v.getUint32(o),t=v.getUint32(o+4);
    if(t===0x74726166){let q=o+8;while(q+8<=o+s){const qs=v.getUint32(q),qt=v.getUint32(q+4);
      if(qt===0x7472756E){const fl=v.getUint32(q+8)&0xFFFFFF,cn=v.getUint32(q+12);let p=q+16;
        if(fl&1)p+=4;if(fl&4)p+=4;for(let i=0;i<cn;i++){if(fl&0x100)p+=4;if(fl&0x200){sz.push(v.getUint32(p));p+=4;}if(fl&0x400)p+=4;if(fl&0x800)p+=4;}}
      q+=qs;}}o+=s;}return sz;}

  _sampleToAnnexB(s) {
    const v=new DataView(s.buffer,s.byteOffset,s.byteLength);const nals=[];let o=0;
    while(o+4<=s.length){const l=v.getUint32(o);o+=4;if(o+l>s.length)break;nals.push(s.subarray(o,o+l));o+=l;}
    return this._nalsToAnnexB(nals);
  }

  _nalsToAnnexB(nals) {
    const tot=nals.reduce((a,n)=>a+4+n.length,0);const b=new Uint8Array(tot);let p=0;
    for(const n of nals){b[p++]=0;b[p++]=0;b[p++]=0;b[p++]=1;b.set(n,p);p+=n.length;}return b;
  }

  dispose() {
    this.disposed = true;
    this.encoder?.close();
    if (this.sb && this.ms?.readyState === 'open') {
      try { this.ms.removeSourceBuffer(this.sb); } catch {}
    }
    if (this.videoEl.src) URL.revokeObjectURL(this.videoEl.src);
  }
}

// ============================================================
// Register SourceHandler on Html5 Tech
// ============================================================

videojs.getTech('Html5').registerSourceHandler({
  canPlayType: (type) => type === 'application/x-hevc-hls' ? 'probably' : '',
  canHandleSource: (src) => src.type === 'application/x-hevc-hls' ? 'probably' : '',
  handleSource: (source, tech) => {
    const handler = new HEVCHandler(source, tech);
    return { dispose: () => handler.dispose() };
  },
}, 0);

// ============================================================
// Create Video.js player
// ============================================================

const player = videojs('player', {
  controls: true,
  autoplay: false,
  muted: true,
  sources: [{ src: 'streams/bbb720/playlist.m3u8', type: 'application/x-hevc-hls' }],
});

window.loadRes = function(name) {
  player.src({ src: `streams/${name}/playlist.m3u8`, type: 'application/x-hevc-hls' });
  logEl.textContent = '';
  log(`Loading ${name}...`);
};

window.loadUrl = function() {
  const url = document.getElementById('hls-url').value.trim();
  if (!url) return;
  player.src({ src: url, type: 'application/x-hevc-hls' });
  logEl.textContent = '';
  log(`Loading URL: ${url}`);
};

log('Video.js + mux.js + HEVC SourceHandler ready');
log('Pipeline: HEVC fMP4 → WASM decode → H.264 encode → mux.js fMP4 → MSE → <video>');
log('Click 720p or 1080p to start.');
</script>
</body>
</html>
