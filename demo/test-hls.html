<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hevc.js — HLS HEVC Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 20px;
  }
  h1 { font-size: 1.4em; margin-bottom: 4px; color: #fff; }
  .subtitle { font-size: 0.85em; color: #888; margin-bottom: 16px; }
  video { max-width: 960px; width: 100%; background: #000; border: 1px solid #0f3460; border-radius: 4px; }
  .controls { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; align-items: center; }
  button {
    background: #16213e; border: 1px solid #0f3460; color: #e0e0e0;
    padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9em;
  }
  button:hover { background: #0f3460; }
  button:disabled { opacity: 0.4; cursor: default; }
  input { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0;
    padding: 8px; border-radius: 4px; font-size: 0.9em; flex: 1; min-width: 300px; }
  #log { font-family: monospace; font-size: 0.8em; color: #aaa; white-space: pre-wrap;
    max-height: 400px; overflow-y: auto; width: 100%; max-width: 960px;
    background: #111; padding: 8px; border-radius: 4px; margin-top: 12px; }
  .info { font-size: 0.85em; color: #53c1de; margin-top: 8px; }
  .pipeline { font-size: 0.75em; color: #666; margin-bottom: 12px; font-family: monospace; }
</style>
</head>
<body>

<h1>hevc.js — HLS HEVC Transcode Demo</h1>
<p class="subtitle">HLS fMP4 HEVC → WASM decode → VideoEncoder H.264 → fMP4 → MSE → &lt;video&gt;</p>
<p class="pipeline">Segments HEVC in, segments H.264 out — cross-browser, native &lt;video&gt;</p>

<video id="video" controls></video>

<div class="controls">
  <input id="url-input" type="text" value="streams/bbb360/playlist.m3u8" placeholder="HLS manifest URL (.m3u8)">
  <button id="btn-load" onclick="loadHLS()">Load HLS</button>
</div>

<div class="info" id="info"></div>
<pre id="log"></pre>

<script src="hevc-decode.js"></script>
<script type="module">
const logEl = document.getElementById('log');
const infoEl = document.getElementById('info');
const videoEl = document.getElementById('video');

function log(msg) {
  const ts = (performance.now() / 1000).toFixed(3);
  logEl.textContent += `[${ts}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

// ---- WASM decoder ----
let decoder = null;

async function initDecoder() {
  const m = await HEVCDecoderModule();
  const api = {
    create: m.cwrap('hevc_decoder_create','number',[]),
    feed: m.cwrap('hevc_decoder_feed','number',['number','number','number']),
    drain: m.cwrap('hevc_decoder_drain','number',['number','number']),
    getDrainedFrame: m.cwrap('hevc_decoder_get_drained_frame','number',['number','number','number']),
    flush: m.cwrap('hevc_decoder_flush','number',['number']),
  };
  const dec = api.create();
  decoder = { m, api, dec };
  log('WASM decoder ready');
}

function wasmFeed(data) {
  const { m, api, dec } = decoder;
  const ptr = m._malloc(data.length);
  m.HEAPU8.set(data, ptr);
  api.feed(dec, ptr, data.length);
  m._free(ptr);
}

function wasmDrain() {
  const { m, api, dec } = decoder;
  const cp = m._malloc(4);
  api.drain(dec, cp);
  const count = m.getValue(cp, 'i32');
  m._free(cp);
  const frames = [];
  const fp = m._malloc(48);
  for (let i = 0; i < count; i++) {
    if (api.getDrainedFrame(dec, i, fp) !== 0) continue;
    frames.push(readFrame(fp));
  }
  m._free(fp);
  return frames;
}

function wasmFlush() {
  const { m, api, dec } = decoder;
  api.flush(dec);
  const frames = [];
  const fp = m._malloc(48);
  for (let i = 0; ; i++) {
    if (api.getDrainedFrame(dec, i, fp) !== 0) break;
    frames.push(readFrame(fp));
  }
  m._free(fp);
  return frames;
}

function readFrame(fp) {
  const { m } = decoder;
  const w=m.getValue(fp+12,'i32'), h=m.getValue(fp+16,'i32');
  const sY=m.getValue(fp+20,'i32'), sC=m.getValue(fp+24,'i32');
  const cw=m.getValue(fp+28,'i32'), ch=m.getValue(fp+32,'i32');
  const bd=m.getValue(fp+36,'i32'), poc=m.getValue(fp+40,'i32');
  return {
    y:copyPlane(m,m.getValue(fp,'*'),w,h,sY), cb:copyPlane(m,m.getValue(fp+4,'*'),cw,ch,sC),
    cr:copyPlane(m,m.getValue(fp+8,'*'),cw,ch,sC), width:w, height:h,
    chromaWidth:cw, chromaHeight:ch, bitDepth:bd, poc
  };
}

function copyPlane(m,ptr,w,h,stride) {
  const out=new Uint16Array(w*h), base=ptr>>1;
  for(let y=0;y<h;y++) out.set(m.HEAPU16.subarray(base+y*stride,base+y*stride+w),y*w);
  return out;
}

// ---- fMP4 demuxer (minimal, parse init + segments) ----
function parseInitSegment(data) {
  const v = new DataView(data.buffer, data.byteOffset, data.byteLength);
  // Find moov → trak → mdia → minf → stbl → stsd → hvc1/hev1 → hvcC
  // Extract nalLengthSize from hvcC byte 21 bits 0-1
  // For now, default to 4 (most common)
  return { nalLengthSize: 4 };
}

function extractNalUnits(sampleData, nalLengthSize) {
  const nals = [];
  const v = new DataView(sampleData.buffer, sampleData.byteOffset, sampleData.byteLength);
  let off = 0;
  while (off + nalLengthSize <= sampleData.length) {
    const len = nalLengthSize === 4 ? v.getUint32(off) : v.getUint16(off);
    off += nalLengthSize;
    if (off + len > sampleData.length) break;
    nals.push(sampleData.subarray(off, off + len));
    off += len;
  }
  return nals;
}

function parseMoofMdat(data) {
  // Walk top-level boxes, find moof+mdat pairs
  const v = new DataView(data.buffer, data.byteOffset, data.byteLength);
  let offset = 0;
  let moofStart = -1, moofSize = 0;
  const samples = [];

  while (offset + 8 <= data.length) {
    let size = v.getUint32(offset);
    const type = v.getUint32(offset + 4);
    if (size === 0) size = data.length - offset;
    if (size < 8) break;

    if (type === 0x6D6F6F66) { // moof
      moofStart = offset;
      moofSize = size;
    } else if (type === 0x6D646174 && moofStart >= 0) { // mdat
      // Extract sample data from mdat payload
      const mdatPayload = data.subarray(offset + 8, offset + size);
      // Parse trun from moof to get sample sizes
      const sampleSizes = parseTrunSizes(data, moofStart, moofSize);
      let soff = 0;
      for (const sz of sampleSizes) {
        if (soff + sz > mdatPayload.length) break;
        samples.push(mdatPayload.subarray(soff, soff + sz));
        soff += sz;
      }
      moofStart = -1;
    }
    offset += size;
  }
  return samples;
}

function parseTrunSizes(data, moofStart, moofSize) {
  const v = new DataView(data.buffer, data.byteOffset, data.byteLength);
  const sizes = [];
  // Walk moof → traf → trun
  let off = moofStart + 8;
  const moofEnd = moofStart + moofSize;
  while (off + 8 <= moofEnd) {
    const sz = v.getUint32(off), tp = v.getUint32(off + 4);
    if (tp === 0x74726166) { // traf
      let inner = off + 8;
      while (inner + 8 <= off + sz) {
        const isz = v.getUint32(inner), itp = v.getUint32(inner + 4);
        if (itp === 0x7472756E) { // trun
          const flags = v.getUint32(inner + 8) & 0xFFFFFF;
          const count = v.getUint32(inner + 12);
          let p = inner + 16;
          if (flags & 0x1) p += 4; // data_offset
          if (flags & 0x4) p += 4; // first_sample_flags
          for (let i = 0; i < count; i++) {
            if (flags & 0x100) p += 4; // duration
            if (flags & 0x200) { sizes.push(v.getUint32(p)); p += 4; }
            if (flags & 0x400) p += 4; // flags
            if (flags & 0x800) p += 4; // cto
          }
        }
        inner += isz;
      }
    }
    off += sz;
  }
  return sizes;
}

// ---- HLS manifest parser (minimal) ----
function parseM3U8(text, baseUrl) {
  const lines = text.split('\n').map(l => l.trim());
  let initUri = null;
  const segments = [];
  let duration = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('#EXT-X-MAP:')) {
      const m = line.match(/URI="([^"]+)"/);
      if (m) initUri = new URL(m[1], baseUrl).href;
    } else if (line.startsWith('#EXTINF:')) {
      duration = parseFloat(line.split(':')[1]);
    } else if (line && !line.startsWith('#')) {
      segments.push({ uri: new URL(line, baseUrl).href, duration });
    }
  }
  return { initUri, segments };
}

// ---- fMP4 muxer (inline) ----
function buildMuxer() {
  const u32=v=>{const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,v);return b};
  const cc=s=>new Uint8Array([s.charCodeAt(0),s.charCodeAt(1),s.charCodeAt(2),s.charCodeAt(3)]);
  const cat=(...a)=>{const t=a.reduce((s,x)=>s+x.byteLength,0);const o=new Uint8Array(t);let p=0;for(const x of a){o.set(x,p);p+=x.byteLength}return o};
  const bx=(t,...p)=>{const d=cat(...p);return cat(u32(8+d.byteLength),cc(t),d)};
  const fb=(t,v,f,...p)=>{const vf=new Uint8Array(4);new DataView(vf.buffer).setUint32(0,(v<<24)|(f&0xFFFFFF));return bx(t,vf,...p)};

  function generateInit(w,h,ts,avcC) {
    const ftyp=bx('ftyp',cc('isom'),u32(0x200),cc('isom'),cc('iso2'),cc('avc1'),cc('mp41'));
    const mvhd=(()=>{const d=new Uint8Array(96);const v=new DataView(d.buffer);v.setUint32(12,ts);v.setUint32(20,0x10000);v.setUint16(24,0x100);[0x10000,0,0,0,0x10000,0,0,0,0x40000000].forEach((x,i)=>v.setUint32(36+i*4,x));v.setUint32(92,2);return bx('mvhd',d)})();
    const tkhd=(()=>{const d=new Uint8Array(84);const v=new DataView(d.buffer);v.setUint32(0,3);v.setUint32(12,1);[0x10000,0,0,0,0x10000,0,0,0,0x40000000].forEach((x,i)=>v.setUint32(40+i*4,x));v.setUint32(76,w<<16);v.setUint32(80,h<<16);return fb('tkhd',0,3,d)})();
    const mdhd=(()=>{const d=new Uint8Array(24);new DataView(d.buffer).setUint32(8,ts);new DataView(d.buffer).setUint16(16,0x55C4);return fb('mdhd',0,0,d)})();
    const hdlr=(()=>{const d=new Uint8Array(21);new DataView(d.buffer).setUint32(4,0x76696465);return fb('hdlr',0,0,d)})();
    const avc1h=(()=>{const d=new Uint8Array(78);const v=new DataView(d.buffer);v.setUint16(6,1);v.setUint16(24,w);v.setUint16(26,h);v.setUint32(28,0x480000);v.setUint32(32,0x480000);v.setUint16(40,1);v.setUint16(74,0x18);v.setInt16(76,-1);return d})();
    const stsd=fb('stsd',0,0,u32(1),bx('avc1',avc1h,bx('avcC',avcC)));
    const stbl=bx('stbl',stsd,fb('stts',0,0,u32(0)),fb('stsc',0,0,u32(0)),fb('stsz',0,0,u32(0),u32(0)),fb('stco',0,0,u32(0)));
    const minf=bx('minf',fb('vmhd',0,1,new Uint8Array(8)),bx('dinf',fb('dref',0,0,u32(1),fb('url ',0,1))),stbl);
    const trak=bx('trak',tkhd,bx('mdia',mdhd,hdlr,minf));
    const trex=(()=>{const d=new Uint8Array(20);const v=new DataView(d.buffer);v.setUint32(0,1);v.setUint32(4,1);return fb('trex',0,0,d)})();
    return cat(ftyp,bx('moov',mvhd,trak,bx('mvex',trex)));
  }

  let seqNum = 1;
  function muxSegment(chunks, bdt, ts) {
    const mdatPayload=cat(...chunks.map(c=>c.data));
    const mdat=bx('mdat',mdatPayload);
    const flags=0x1|0x100|0x200|0x400;
    const td=new Uint8Array(8+chunks.length*12);const tv=new DataView(td.buffer);
    tv.setUint32(0,chunks.length); tv.setUint32(4,0);
    let o=8;
    for(const c of chunks){tv.setUint32(o,Math.round(c.duration*ts/1e6));tv.setUint32(o+4,c.data.byteLength);tv.setUint32(o+8,c.isKeyframe?0x02000000:0x01010000);o+=12}
    const trun=fb('trun',0,flags,td);
    const traf=bx('traf',fb('tfhd',0,0x020000,u32(1)),fb('tfdt',0,0,u32(bdt)),trun);
    const moof=bx('moof',fb('mfhd',0,0,u32(seqNum++)),traf);
    // patch data_offset
    const mv=new DataView(moof.buffer,moof.byteOffset,moof.byteLength);
    let p=8;
    while(p+8<=moof.byteLength){const sz=mv.getUint32(p),tp=mv.getUint32(p+4);
      if(tp===0x74726166){let q=p+8;while(q+8<=p+sz){const qs=mv.getUint32(q),qt=mv.getUint32(q+4);
        if(qt===0x7472756E){mv.setUint32(q+8+4+4,moof.byteLength+8);break}q+=qs}break}p+=sz}
    return cat(moof,mdat);
  }

  return { generateInit, muxSegment };
}

// ---- Main: Load HLS, transcode, play ----

window.loadHLS = async function() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  logEl.textContent = '';

  log(`Loading manifest: ${url}`);

  if (!decoder) await initDecoder();
  if (typeof VideoEncoder === 'undefined') { log('ERROR: VideoEncoder not available'); return; }

  // 1. Parse manifest
  const manifestResp = await fetch(url);
  const manifestText = await manifestResp.text();
  const baseUrl = new URL(url, location.href).href;
  const { initUri, segments } = parseM3U8(manifestText, baseUrl);
  log(`Manifest: ${segments.length} segments, init=${initUri ? 'yes' : 'no'}`);

  if (!initUri) { log('ERROR: no init segment (EXT-X-MAP) in manifest'); return; }

  // 2. Fetch init segment
  const initData = new Uint8Array(await (await fetch(initUri)).arrayBuffer());
  const initInfo = parseInitSegment(initData);
  log(`Init segment: ${initData.byteLength} bytes, nalLengthSize=${initInfo.nalLengthSize}`);

  // 3. Process segments
  const t0 = performance.now();
  let totalFrames = 0;
  let allFrames = [];

  for (let si = 0; si < segments.length; si++) {
    const seg = segments[si];
    log(`Segment ${si}: fetching ${seg.uri}...`);
    const segData = new Uint8Array(await (await fetch(seg.uri)).arrayBuffer());

    // Demux: extract samples from moof+mdat
    const samples = parseMoofMdat(segData);
    log(`  ${samples.length} samples in segment`);

    // For each sample, extract NAL units and feed to decoder
    for (const sampleData of samples) {
      const nals = extractNalUnits(sampleData, initInfo.nalLengthSize);
      // Reassemble with Annex B start codes
      const totalSize = nals.reduce((s, n) => s + 4 + n.length, 0);
      const buf = new Uint8Array(totalSize);
      let off = 0;
      for (const nal of nals) {
        buf[off++] = 0; buf[off++] = 0; buf[off++] = 0; buf[off++] = 1;
        buf.set(nal, off); off += nal.length;
      }
      wasmFeed(buf);
    }

    const frames = wasmDrain();
    allFrames.push(...frames);
    totalFrames += frames.length;
    log(`  Drained ${frames.length} frames (total: ${totalFrames})`);
  }

  // Flush remaining
  const flushed = wasmFlush();
  allFrames.push(...flushed);
  totalFrames += flushed.length;

  const decMs = performance.now() - t0;
  log(`Decoded ${totalFrames} frames in ${decMs.toFixed(0)}ms (${(totalFrames/decMs*1000).toFixed(1)} fps)`);

  if (totalFrames === 0) { log('No frames decoded'); return; }

  // 4. Encode to H.264
  const w = allFrames[0].width, h = allFrames[0].height;
  const fps = 25;
  const timescale = 90000;
  log(`Encoding ${totalFrames} frames (${w}x${h}) to H.264...`);

  const chunks = [];
  let avcCDesc = null;

  const encoder = new VideoEncoder({
    output(chunk, meta) {
      if (meta?.decoderConfig?.description && !avcCDesc) {
        avcCDesc = new Uint8Array(meta.decoderConfig.description);
        log(`  avcC captured (${avcCDesc.byteLength} bytes)`);
      }
      const d = new Uint8Array(chunk.byteLength);
      chunk.copyTo(d);
      chunks.push({ data: d, timestamp: chunk.timestamp, duration: chunk.duration || Math.round(1e6/fps), isKeyframe: chunk.type === 'key' });
    },
    error(e) { log('Encoder error: ' + e.message); }
  });

  encoder.configure({
    codec: 'avc1.42001f', width: w, height: h,
    bitrate: w * h * fps * 0.15, framerate: fps,
    hardwareAcceleration: 'prefer-hardware',
    avc: { format: 'avc' },
  });

  const t1 = performance.now();
  for (let i = 0; i < allFrames.length; i++) {
    const f = allFrames[i];
    const shift = f.bitDepth > 8 ? f.bitDepth - 8 : 0;
    const ySize = w*h, cSize = f.chromaWidth*f.chromaHeight;
    const i420 = new Uint8Array(ySize + cSize*2);
    for (let j=0;j<ySize;j++) i420[j] = Math.min(255, f.y[j]>>shift);
    for (let j=0;j<cSize;j++) i420[ySize+j] = Math.min(255, f.cb[j]>>shift);
    for (let j=0;j<cSize;j++) i420[ySize+cSize+j] = Math.min(255, f.cr[j]>>shift);
    const vf = new VideoFrame(i420, { format:'I420', codedWidth:w, codedHeight:h, timestamp:Math.round(i*1e6/fps), duration:Math.round(1e6/fps) });
    encoder.encode(vf, { keyFrame: i % (fps*2) === 0 }); // keyframe every 2s
    vf.close();
  }
  await encoder.flush();
  encoder.close();
  const encMs = performance.now() - t1;
  log(`Encoded ${chunks.length} chunks in ${encMs.toFixed(0)}ms (${(allFrames.length/encMs*1000).toFixed(1)} fps)`);

  if (!avcCDesc) { log('ERROR: no avcC'); return; }

  // 5. Mux + MSE
  log('Muxing fMP4 H.264 + feeding MSE...');
  const { generateInit, muxSegment } = buildMuxer();
  const initSeg = generateInit(w, h, timescale, avcCDesc);

  const ms = new MediaSource();
  videoEl.src = URL.createObjectURL(ms);
  await new Promise(r => ms.addEventListener('sourceopen', r, { once: true }));
  const sb = ms.addSourceBuffer('video/mp4; codecs="avc1.42001f"');
  await new Promise((res, rej) => { sb.addEventListener('updateend', res, {once:true}); sb.addEventListener('error', rej, {once:true}); sb.appendBuffer(initSeg); });

  // Mux all chunks as one segment
  const mediaSeg = muxSegment(chunks, 0, timescale);
  await new Promise((res, rej) => { sb.addEventListener('updateend', res, {once:true}); sb.addEventListener('error', rej, {once:true}); sb.appendBuffer(mediaSeg); });

  ms.endOfStream();

  const totalMs = performance.now() - t0;
  log(`Done! Total: ${totalMs.toFixed(0)}ms. Press play.`);
  infoEl.textContent = `${w}x${h} | ${totalFrames} frames | HLS HEVC → H.264 MSE | ${totalMs.toFixed(0)}ms total`;
};

log('Ready. Click "Load HLS" to start.');
log('Pipeline: HLS manifest → fetch fMP4 HEVC segments → demux → WASM decode → H.264 encode → fMP4 mux → MSE → <video>');
</script>
</body>
</html>
