<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hevc.js — TranscodePipeline Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 20px;
  }
  h1 { font-size: 1.4em; margin-bottom: 8px; color: #fff; }
  .subtitle { font-size: 0.85em; color: #888; margin-bottom: 16px; }
  video { max-width: 960px; width: 100%; background: #000; border: 1px solid #0f3460; border-radius: 4px; }
  .controls { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
  button, label {
    background: #16213e; border: 1px solid #0f3460; color: #e0e0e0;
    padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9em;
  }
  button:hover, label:hover { background: #0f3460; }
  button:disabled { opacity: 0.4; cursor: default; }
  input[type="file"] { display: none; }
  #log { font-family: monospace; font-size: 0.8em; color: #aaa; white-space: pre-wrap;
    max-height: 300px; overflow-y: auto; width: 100%; max-width: 960px;
    background: #111; padding: 8px; border-radius: 4px; margin-top: 12px; }
  .info { font-size: 0.85em; color: #53c1de; margin-top: 8px; }
</style>
</head>
<body>

<h1>hevc.js — Transcode Pipeline Test</h1>
<p class="subtitle">HEVC .265 → WASM decode → VideoEncoder H.264 → fMP4 → MSE → &lt;video&gt;</p>

<video id="video" controls></video>

<div class="controls">
  <label for="file-input">Open .265 file</label>
  <input type="file" id="file-input" accept=".265,.hevc,.h265,.mp4">
  <button onclick="loadPreset('bbb360.265')">BBB 360p</button>
  <button onclick="loadPreset('full_qcif_10f.265')">QCIF 10f</button>
</div>

<div class="info" id="info"></div>
<pre id="log"></pre>

<script src="hevc-decode.js"></script>
<script type="module">
const logEl = document.getElementById('log');
const infoEl = document.getElementById('info');
const videoEl = document.getElementById('video');

function log(msg) {
  const ts = (performance.now() / 1000).toFixed(3);
  logEl.textContent += `[${ts}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

// ---- Minimal inline pipeline (no bundler needed for demo) ----
// We use the WASM directly + inline transcode logic

let decoder = null;

async function initDecoder() {
  const m = await HEVCDecoderModule();
  const api = {
    create: m.cwrap('hevc_decoder_create','number',[]),
    destroy: m.cwrap('hevc_decoder_destroy',null,['number']),
    feed: m.cwrap('hevc_decoder_feed','number',['number','number','number']),
    drain: m.cwrap('hevc_decoder_drain','number',['number','number']),
    getDrainedFrame: m.cwrap('hevc_decoder_get_drained_frame','number',['number','number','number']),
    flush: m.cwrap('hevc_decoder_flush','number',['number']),
  };
  const dec = api.create();
  if (!dec) throw new Error('Failed to create decoder');
  decoder = { m, api, dec };
  log('WASM decoder ready');
}

function feedAndDrain(data) {
  const { m, api, dec } = decoder;
  const ptr = m._malloc(data.length);
  m.HEAPU8.set(data, ptr);
  api.feed(dec, ptr, data.length);
  m._free(ptr);

  const countPtr = m._malloc(4);
  api.drain(dec, countPtr);
  const count = m.getValue(countPtr, 'i32');
  m._free(countPtr);

  return extractFrames(count, api.getDrainedFrame);
}

function flushDecoder() {
  const { m, api, dec } = decoder;
  api.flush(dec);
  // Read drained frames
  const frames = [];
  const fp = m._malloc(48);
  for (let i = 0; ; i++) {
    if (api.getDrainedFrame(dec, i, fp) !== 0) break;
    frames.push(readFrame(fp));
  }
  m._free(fp);
  return frames;
}

function extractFrames(count, getDrainedFrame) {
  const { m, api, dec } = decoder;
  const frames = [];
  const fp = m._malloc(48);
  for (let i = 0; i < count; i++) {
    if (getDrainedFrame(dec, i, fp) !== 0) continue;
    frames.push(readFrame(fp));
  }
  m._free(fp);
  return frames;
}

function readFrame(fp) {
  const { m } = decoder;
  const w = m.getValue(fp+12,'i32'), h = m.getValue(fp+16,'i32');
  const sY = m.getValue(fp+20,'i32'), sC = m.getValue(fp+24,'i32');
  const cw = m.getValue(fp+28,'i32'), ch = m.getValue(fp+32,'i32');
  const bd = m.getValue(fp+36,'i32'), poc = m.getValue(fp+40,'i32');
  const yP = m.getValue(fp,'*'), cbP = m.getValue(fp+4,'*'), crP = m.getValue(fp+8,'*');
  return {
    y: copyPlane(m, yP, w, h, sY),
    cb: copyPlane(m, cbP, cw, ch, sC),
    cr: copyPlane(m, crP, cw, ch, sC),
    width: w, height: h, chromaWidth: cw, chromaHeight: ch, bitDepth: bd, poc
  };
}

function copyPlane(m, ptr, w, h, stride) {
  const out = new Uint16Array(w*h), base = ptr>>1;
  for (let y=0; y<h; y++) out.set(m.HEAPU16.subarray(base+y*stride, base+y*stride+w), y*w);
  return out;
}

// ---- Transcode: YUV → VideoFrame → VideoEncoder → fMP4 → MSE ----

async function transcode(frames, fps) {
  if (typeof VideoEncoder === 'undefined') {
    log('ERROR: VideoEncoder not supported in this browser');
    return;
  }

  const w = frames[0].width, h = frames[0].height;
  log(`Encoding ${frames.length} frames (${w}x${h}) to H.264...`);

  const chunks = [];
  let avcCDesc = null;

  const encoder = new VideoEncoder({
    output(chunk, meta) {
      if (meta?.decoderConfig?.description && !avcCDesc) {
        avcCDesc = new Uint8Array(meta.decoderConfig.description);
        log(`avcC description captured (${avcCDesc.byteLength} bytes)`);
      }
      const data = new Uint8Array(chunk.byteLength);
      chunk.copyTo(data);
      chunks.push({ data, timestamp: chunk.timestamp, duration: chunk.duration || Math.round(1e6/fps), isKeyframe: chunk.type === 'key' });
    },
    error(e) { log('Encoder error: ' + e.message); }
  });

  encoder.configure({
    codec: 'avc1.42001f',
    width: w, height: h,
    bitrate: w * h * fps * 0.1,
    framerate: fps,
    hardwareAcceleration: 'prefer-hardware',
    avc: { format: 'avc' },
  });

  const t0 = performance.now();
  for (let i = 0; i < frames.length; i++) {
    const f = frames[i];
    const shift = f.bitDepth > 8 ? f.bitDepth - 8 : 0;
    const ySize = f.width * f.height;
    const cSize = f.chromaWidth * f.chromaHeight;
    const i420 = new Uint8Array(ySize + cSize * 2);
    for (let j = 0; j < ySize; j++) i420[j] = Math.min(255, f.y[j] >> shift);
    for (let j = 0; j < cSize; j++) i420[ySize+j] = Math.min(255, f.cb[j] >> shift);
    for (let j = 0; j < cSize; j++) i420[ySize+cSize+j] = Math.min(255, f.cr[j] >> shift);

    const vf = new VideoFrame(i420, {
      format: 'I420', codedWidth: w, codedHeight: h,
      timestamp: Math.round(i * 1e6 / fps),
      duration: Math.round(1e6 / fps),
    });
    encoder.encode(vf, { keyFrame: i === 0 });
    vf.close();
  }
  await encoder.flush();
  encoder.close();
  const encMs = performance.now() - t0;
  log(`Encoded ${chunks.length} H.264 chunks in ${encMs.toFixed(0)}ms (${(frames.length/encMs*1000).toFixed(1)} fps)`);

  if (!avcCDesc) { log('ERROR: no avcC description'); return; }

  // ---- fMP4 mux (inline minimal) ----
  log('Muxing fMP4...');
  const timescale = 90000;
  const { generateInit, muxSegment } = buildMuxer();
  const initSeg = generateInit(w, h, timescale, avcCDesc);
  const samples = chunks.map(c => ({
    data: c.data,
    duration: Math.round(c.duration * timescale / 1e6),
    isKeyframe: c.isKeyframe,
  }));
  const mediaSeg = muxSegment(samples, 0);
  log(`Init: ${initSeg.byteLength} bytes, Media: ${mediaSeg.byteLength} bytes`);

  // ---- MSE ----
  log('Feeding MSE...');
  const ms = new MediaSource();
  videoEl.src = URL.createObjectURL(ms);
  await new Promise(r => ms.addEventListener('sourceopen', r, { once: true }));

  const mime = 'video/mp4; codecs="avc1.42001f"';
  if (!MediaSource.isTypeSupported(mime)) { log('ERROR: ' + mime + ' not supported'); return; }
  const sb = ms.addSourceBuffer(mime);

  await appendBuffer(sb, initSeg);
  await appendBuffer(sb, mediaSeg);
  ms.endOfStream();

  log('Done! Press play.');
  infoEl.textContent = `${w}x${h} | ${frames.length} frames | decode+encode: ${encMs.toFixed(0)}ms`;
}

function appendBuffer(sb, data) {
  return new Promise((resolve, reject) => {
    sb.addEventListener('updateend', resolve, { once: true });
    sb.addEventListener('error', reject, { once: true });
    sb.appendBuffer(data);
  });
}

// ---- Minimal fMP4 muxer (inline, no imports) ----
function buildMuxer() {
  const u32 = v => { const b = new Uint8Array(4); new DataView(b.buffer).setUint32(0,v); return b; };
  const u16 = v => { const b = new Uint8Array(2); new DataView(b.buffer).setUint16(0,v); return b; };
  const cc = s => new Uint8Array([s.charCodeAt(0),s.charCodeAt(1),s.charCodeAt(2),s.charCodeAt(3)]);
  const cat = (...a) => { const t=a.reduce((s,x)=>s+x.byteLength,0); const o=new Uint8Array(t); let p=0; for(const x of a){o.set(x,p);p+=x.byteLength;} return o; };
  const bx = (t,...p) => { const d=cat(...p); return cat(u32(8+d.byteLength),cc(t),d); };
  const fb = (t,v,f,...p) => { const vf=new Uint8Array(4); new DataView(vf.buffer).setUint32(0,(v<<24)|(f&0xFFFFFF)); return bx(t,vf,...p); };

  function generateInit(w,h,ts,avcC) {
    const ftyp = bx('ftyp',cc('isom'),u32(0x200),cc('isom'),cc('iso2'),cc('avc1'),cc('mp41'));
    const mvhd = (() => { const d=new Uint8Array(96); const v=new DataView(d.buffer); v.setUint32(12,ts); v.setUint32(20,0x10000); v.setUint16(24,0x100); const mx=[0x10000,0,0,0,0x10000,0,0,0,0x40000000]; for(let i=0;i<9;i++) v.setUint32(36+i*4,mx[i]); v.setUint32(92,2); return bx('mvhd',d); })();
    const tkhd = (() => { const d=new Uint8Array(84); const v=new DataView(d.buffer); v.setUint32(0,3); v.setUint32(12,1); const mx=[0x10000,0,0,0,0x10000,0,0,0,0x40000000]; for(let i=0;i<9;i++) v.setUint32(40+i*4,mx[i]); v.setUint32(76,w<<16); v.setUint32(80,h<<16); return fb('tkhd',0,3,d); })();
    const mdhd = (() => { const d=new Uint8Array(24); new DataView(d.buffer).setUint32(8,ts); new DataView(d.buffer).setUint16(16,0x55C4); return fb('mdhd',0,0,d); })();
    const hdlr = (() => { const d=new Uint8Array(21); new DataView(d.buffer).setUint32(4,0x76696465); return fb('hdlr',0,0,d); })();
    const avc1h = (() => { const d=new Uint8Array(78); const v=new DataView(d.buffer); v.setUint16(6,1); v.setUint16(24,w); v.setUint16(26,h); v.setUint32(28,0x480000); v.setUint32(32,0x480000); v.setUint16(40,1); v.setUint16(74,0x18); v.setInt16(76,-1); return d; })();
    const stsd = fb('stsd',0,0,u32(1),bx('avc1',avc1h,bx('avcC',avcC)));
    const stbl = bx('stbl',stsd,fb('stts',0,0,u32(0)),fb('stsc',0,0,u32(0)),fb('stsz',0,0,u32(0),u32(0)),fb('stco',0,0,u32(0)));
    const dinf = bx('dinf',fb('dref',0,0,u32(1),fb('url ',0,1)));
    const minf = bx('minf',fb('vmhd',0,1,new Uint8Array(8)),dinf,stbl);
    const mdia = bx('mdia',mdhd,hdlr,minf);
    const trak = bx('trak',tkhd,mdia);
    const trex = (() => { const d=new Uint8Array(20); new DataView(d.buffer).setUint32(0,1); new DataView(d.buffer).setUint32(4,1); return fb('trex',0,0,d); })();
    const moov = bx('moov',mvhd,trak,bx('mvex',trex));
    return cat(ftyp,moov);
  }

  function muxSegment(samples, bdt) {
    // mdat
    const mdatPayload = cat(...samples.map(s=>s.data));
    const mdat = bx('mdat', mdatPayload);

    // trun
    const trunFlags = 0x1|0x100|0x200|0x400; // data-offset, duration, size, flags
    const trunData = new Uint8Array(8 + samples.length * 12);
    const tv = new DataView(trunData.buffer);
    tv.setUint32(0, samples.length);
    tv.setUint32(4, 0); // data_offset placeholder
    let off = 8;
    for (const s of samples) {
      tv.setUint32(off, s.duration);
      tv.setUint32(off+4, s.data.byteLength);
      tv.setUint32(off+8, s.isKeyframe ? 0x02000000 : 0x01010000);
      off += 12;
    }
    const trun = fb('trun', 0, trunFlags, trunData);

    const tfhd = fb('tfhd', 0, 0x020000, u32(1));
    const tfdt = fb('tfdt', 0, 0, u32(bdt));
    const traf = bx('traf', tfhd, tfdt, trun);
    const mfhd = fb('mfhd', 0, 0, u32(1));
    const moof = bx('moof', mfhd, traf);

    // Patch trun data_offset = moof.size + 8
    const dataOffset = moof.byteLength + 8;
    // Find trun inside moof and patch
    const mv = new DataView(moof.buffer, moof.byteOffset, moof.byteLength);
    let p = 8;
    while (p + 8 <= moof.byteLength) {
      const sz = mv.getUint32(p), tp = mv.getUint32(p+4);
      if (tp === 0x74726166) { // traf
        let q = p+8;
        while (q+8 <= p+sz) {
          const qs = mv.getUint32(q), qt = mv.getUint32(q+4);
          if (qt === 0x7472756E) { // trun
            mv.setUint32(q+8+4+4, dataOffset); // version+flags(4) + count(4) + data_offset
            break;
          }
          q += qs;
        }
        break;
      }
      p += sz;
    }

    return cat(moof, mdat);
  }

  return { generateInit, muxSegment };
}

// ---- Event handlers ----

async function processFile(data, name) {
  log(`Processing ${name} (${(data.byteLength/1024).toFixed(0)} KB)...`);

  if (!decoder) await initDecoder();

  const t0 = performance.now();
  const frames = feedAndDrain(data);
  const flushed = flushDecoder();
  const allFrames = [...frames, ...flushed];
  const decMs = performance.now() - t0;
  log(`Decoded ${allFrames.length} frames in ${decMs.toFixed(0)}ms (${(allFrames.length/decMs*1000).toFixed(1)} fps)`);

  if (allFrames.length === 0) { log('No frames decoded'); return; }

  await transcode(allFrames, 25);
}

window.loadPreset = async (name) => {
  log(`Fetching ${name}...`);
  const resp = await fetch(name);
  const data = new Uint8Array(await resp.arrayBuffer());
  await processFile(data, name);
};

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const data = new Uint8Array(await file.arrayBuffer());
  await processFile(data, file.name);
});

// Init
log('Ready. Choose a preset or open a .265 file.');
log('Requirements: Chrome 94+ or Firefox 114+ (VideoEncoder + MSE)');
</script>
</body>
</html>
