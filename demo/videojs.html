<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hevc.js — Video.js HEVC Playback</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="demo.css">
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/videojs-hls-quality-selector@2.0.0/dist/videojs-hls-quality-selector.css">
</head>
<body>

<nav class="demo-nav">
  <a href="https://hevcjs.dev" class="demo-nav-brand">hevc<span>.js</span></a>
  <a href="index.html">Decoder</a>
  <a href="dash.html">dash.js</a>
  <a href="hls.html">hls.js</a>
  <a href="videojs.html" class="active">Video.js</a>
</nav>

<main class="demo-main">
  <h1 class="demo-title">Video.js HEVC Playback</h1>
  <p class="demo-subtitle">HEVC HLS via Video.js + VHS + MSE intercept (HEVC &rarr; H.264)</p>

  <div class="demo-controls">
    <input type="text" id="hls-url" class="demo-input" placeholder="Enter HEVC HLS URL (.m3u8)...">
    <button class="demo-btn demo-btn-primary" onclick="loadStream()">Load</button>
  </div>
  <div class="demo-presets">
    <button class="demo-btn" onclick="loadStream('streams/hls_abr/master.m3u8')">BBB ABR (30s)</button>
  </div>

  <div class="demo-toggle">
    <input type="checkbox" id="force-transcode" class="demo-toggle-switch">
    <label for="force-transcode" class="demo-toggle-label">Force transcoding (bypass native HEVC detection)</label>
  </div>

  <video-js id="player" class="vjs-big-play-centered vjs-fluid" controls></video-js>
  <div id="status" class="demo-status">Loading...</div>
  <textarea id="log" class="demo-log" readonly></textarea>
</main>

<footer class="demo-footer">
  <a href="https://hevcjs.dev">hevc.js</a> &middot; <a href="https://github.com/privaloops/hevc.js">GitHub</a> &middot; MIT License
</footer>

<!-- WASM decoder -->
<script src="hevc-decode.js"></script>
<!-- Video.js -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<!-- contrib-quality-levels -->
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>
<!-- hls-quality-selector -->
<script src="https://cdn.jsdelivr.net/npm/videojs-hls-quality-selector@2.0.0/dist/videojs-hls-quality-selector.min.js"></script>
<!-- hevc.js/videojs bundle -->
<script src="videojs-bundle.js"></script>

<script>
const logEl = document.getElementById('log');
function log(...args) {
  const line = args.map(a => {
    if (a instanceof Error) return `${a.name}: ${a.message}`;
    if (typeof a === 'object') return JSON.stringify(a);
    return String(a);
  }).join(' ');
  logEl.value += line + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}
const _log = console.log, _warn = console.warn, _err = console.error;
console.log = (...a) => { _log(...a); log('[log]', ...a); };
console.warn = (...a) => { _warn(...a); log('[warn]', ...a); };
console.error = (...a) => { _err(...a); log('[ERROR]', ...a); };

let hevcReady = false;

(async () => {
  const forceTranscode = document.getElementById('force-transcode').checked;
  const cleanup = await HevcVideojs.attachHevcSupport({
    workerUrl: './transcode-worker.js',
    forceTranscode,
  });
  hevcReady = cleanup !== null && typeof cleanup === 'function';

  if (!hevcReady && !forceTranscode) {
    document.getElementById('status').textContent =
      'HEVC transcoding not available — native HEVC or no VideoEncoder';
    return;
  }

  document.getElementById('status').textContent = 'Ready — choose a preset or enter an HLS URL';
})();

document.getElementById('force-transcode').addEventListener('change', async () => {
  const forceTranscode = document.getElementById('force-transcode').checked;
  const cleanup = await HevcVideojs.attachHevcSupport({
    workerUrl: './transcode-worker.js',
    forceTranscode,
  });
  hevcReady = cleanup !== null && typeof cleanup === 'function';
  document.getElementById('status').textContent = 'Toggle changed — reload a stream to apply';
});

let player = null;

function loadStream(presetUrl) {
  const url = presetUrl || document.getElementById('hls-url').value.trim();
  if (!url) return;
  document.getElementById('hls-url').value = url;

  if (player) {
    player.dispose();
    const wrap = document.querySelector('.demo-main');
    const statusEl = document.getElementById('status');
    const vjsEl = document.createElement('video-js');
    vjsEl.id = 'player';
    vjsEl.className = 'vjs-big-play-centered vjs-fluid';
    vjsEl.setAttribute('controls', '');
    wrap.insertBefore(vjsEl, statusEl);
  }

  player = videojs('player', {
    html5: { vhs: {} },
    controls: true,
    autoplay: true,
    muted: false,
  });

  if (player.qualityLevels) {
    const ql = player.qualityLevels();
    ql.on('addqualitylevel', (e) => {
      const level = e.qualityLevel;
      log(`[quality] Level added: ${level.width}x${level.height} ${level.codecs || ''}`);
    });
    ql.on('change', () => {
      const active = ql[ql.selectedIndex];
      if (active) {
        log(`[quality] Switched to: ${active.width}x${active.height}`);
        document.getElementById('status').textContent =
          `Playing ${active.width}x${active.height} via Video.js + hevc.js`;
      }
    });
  }
  if (player.hlsQualitySelector) {
    player.hlsQualitySelector({ displayCurrentQuality: true });
  }

  player.on('playing', () => {
    document.getElementById('status').textContent = 'Playing via Video.js + hevc.js';
  });
  player.on('error', () => {
    const err = player.error();
    log(`[videojs] Error: ${err?.code} ${err?.message}`);
    document.getElementById('status').textContent = `Error: ${err?.message}`;
  });

  player.src({ type: 'application/x-mpegURL', src: url });
  document.getElementById('status').textContent = 'Loading ' + url.split('/').pop() + '...';
}
</script>
</body>
</html>
