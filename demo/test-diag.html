<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>diag</title>
<style>body{background:#1a1a2e;color:#e0e0e0;font-family:monospace;padding:20px}
canvas{border:2px solid #0f3460;margin:8px;max-width:480px}h2{color:#53c1de;margin:12px 0 4px}
#log{white-space:pre-wrap;font-size:0.8em;color:#aaa;max-height:400px;overflow:auto;background:#111;padding:8px}</style>
</head><body>
<h1>Diagnostic: batch decode + canvas render</h1>
<div id="out"></div>
<pre id="log"></pre>
<script src="hevc-decode.js"></script>
<script>
const log = msg => { document.getElementById('log').textContent += msg + '\n'; };

function render(f, label) {
  const h2 = document.createElement('h2'); h2.textContent = label;
  const cv = document.createElement('canvas');
  cv.width = f.width; cv.height = f.height;
  document.getElementById('out').append(h2, cv);
  const ctx = cv.getContext('2d');
  const img = ctx.createImageData(f.width, f.height);
  const shift = f.bitDepth > 8 ? f.bitDepth - 8 : 0;
  for (let py = 0; py < f.height; py++) {
    for (let px = 0; px < f.width; px++) {
      const yv = f.y[py * f.width + px] >> shift;
      const cx = px >> 1, cy = py >> 1;
      const ci = cy * f.chromaWidth + cx;
      const cb = (f.cb[ci] >> shift) - 128;
      const cr = (f.cr[ci] >> shift) - 128;
      const o = (py * f.width + px) * 4;
      img.data[o]   = Math.max(0, Math.min(255, Math.round(yv + 1.402 * cr)));
      img.data[o+1] = Math.max(0, Math.min(255, Math.round(yv - 0.344 * cb - 0.714 * cr)));
      img.data[o+2] = Math.max(0, Math.min(255, Math.round(yv + 1.772 * cb)));
      img.data[o+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

(async () => {
  log('Loading WASM...');
  const m = await HEVCDecoderModule();
  const create = m.cwrap('hevc_decoder_create','number',[]);
  const decode = m.cwrap('hevc_decoder_decode','number',['number','number','number']);
  const getCount = m.cwrap('hevc_decoder_get_frame_count','number',['number']);
  const getFrame = m.cwrap('hevc_decoder_get_frame','number',['number','number','number']);

  // Use a KNOWN GOOD file — the oracle test fixture
  const files = ['full_qcif_10f.265', 'bbb720_singleslice.265'];
  for (const fname of files) {
    log(`\n=== ${fname} ===`);
    let raw;
    try {
      const resp = await fetch(fname);
      if (!resp.ok) throw new Error(resp.status);
      raw = new Uint8Array(await resp.arrayBuffer());
    } catch(e) { log('  File not found: ' + e); continue; }
    log(`  ${raw.byteLength} bytes`);

    const dec = create();
    const ptr = m._malloc(raw.length);
    m.HEAPU8.set(raw, ptr);
    decode(dec, ptr, raw.length);
    m._free(ptr);

    const count = getCount(dec);
    log(`  Decoded: ${count} frames`);

    if (count === 0) { log('  No frames'); continue; }

    // Extract frame 0
    const fp = m._malloc(48);
    const ret = getFrame(dec, 0, fp);
    if (ret !== 0) { log('  getFrame failed'); m._free(fp); continue; }

    const w  = m.getValue(fp+12,'i32'), h  = m.getValue(fp+16,'i32');
    const sY = m.getValue(fp+20,'i32'), sC = m.getValue(fp+24,'i32');
    const cw = m.getValue(fp+28,'i32'), ch = m.getValue(fp+32,'i32');
    const bd = m.getValue(fp+36,'i32');

    log(`  ${w}x${h} bd=${bd} strideY=${sY} strideC=${sC} chromaW=${cw} chromaH=${ch}`);

    const cp = (ptr,pw,ph,ps) => {
      const o = new Uint16Array(pw*ph), b = ptr>>1;
      for (let y = 0; y < ph; y++) o.set(m.HEAPU16.subarray(b+y*ps, b+y*ps+pw), y*pw);
      return o;
    };

    const f = {
      y:  cp(m.getValue(fp,'*'),   w,  h,  sY),
      cb: cp(m.getValue(fp+4,'*'), cw, ch, sC),
      cr: cp(m.getValue(fp+8,'*'), cw, ch, sC),
      width: w, height: h, chromaWidth: cw, chromaHeight: ch, bitDepth: bd
    };
    m._free(fp);

    log(`  Y[0..7]:  ${Array.from(f.y.subarray(0,8))}`);
    log(`  Cb[0..7]: ${Array.from(f.cb.subarray(0,8))}`);
    log(`  Cr[0..7]: ${Array.from(f.cr.subarray(0,8))}`);
    log(`  Y.len=${f.y.length} (expect ${w*h}), Cb.len=${f.cb.length} (expect ${cw*ch})`);

    // Check for suspicious values
    let yMin=65535,yMax=0,cbMin=65535,cbMax=0;
    for (let i=0;i<f.y.length;i++) { if(f.y[i]<yMin)yMin=f.y[i]; if(f.y[i]>yMax)yMax=f.y[i]; }
    for (let i=0;i<f.cb.length;i++) { if(f.cb[i]<cbMin)cbMin=f.cb[i]; if(f.cb[i]>cbMax)cbMax=f.cb[i]; }
    log(`  Y range: ${yMin}..${yMax}, Cb range: ${cbMin}..${cbMax}`);

    render(f, `${fname} — frame 0 (${w}x${h})`);
  }

  log('\nDone.');
})();
</script></body></html>
